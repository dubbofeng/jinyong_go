<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金庸棋侠传 - 游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #game-title {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #game-container {
            border: 4px solid #374151;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: #1f2937;
        }
        
        #game-tips {
            color: #9ca3af;
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
        }
        
        #game-tips p {
            margin: 0.25rem 0;
        }
    </style>
</head>
<body>
    <h1 id="game-title">金庸棋侠传</h1>
    <div id="game-container"></div>
    <div id="game-tips">
        <p>使用方向键或WASD移动角色</p>
        <p>按空格键与NPC对话</p>
    </div>
    
    <script type="module" src="/game/main.js"></script>
</body>
</html>
